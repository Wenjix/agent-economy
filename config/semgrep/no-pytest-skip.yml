rules:
  - id: agent-economy.no-pytest-skip
    languages: [python]
    message: >
      Skipping tests is not allowed. Tests must either pass or fail.
      Do not use pytest.skip(), @pytest.mark.skip, or @pytest.mark.skipif.
    severity: ERROR
    pattern-either:
      - pattern: pytest.skip(...)
      - pattern-regex: '@pytest\.mark\.skip'
    paths:
      include:
        - src/
        - tests/

  - id: no-pytest-skip.no-nosemgrep
    languages: [python]
    severity: ERROR
    message: |
      Do not use '# nosemgrep' to suppress semgrep findings.
      Fix the underlying issue instead.
    pattern-regex: '(?m)#\s*nosemgrep(?::\s*.*)?'
    paths:
      include:
        - src/
      exclude:
        - tests/
