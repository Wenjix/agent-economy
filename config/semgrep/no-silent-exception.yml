rules:
  - id: agent-economy.no-silent-broad-except
    languages: [python]
    message: >
      Broad 'except Exception' that only logs swallows errors silently.
      Catch a specific exception type instead, or re-raise after logging.
    severity: ERROR
    pattern: |
      try:
          ...
      except Exception:
          $LOGGER.$METHOD(...)
    paths:
      include:
        - src/
      exclude:
        - tests/

  - id: no-silent-exception.no-nosemgrep
    languages: [python]
    severity: ERROR
    message: |
      Do not use '# nosemgrep' to suppress semgrep findings.
      Fix the underlying issue instead.
    pattern-regex: '(?m)#\s*nosemgrep(?::\s*.*)?'
    paths:
      include:
        - src/
      exclude:
        - tests/
