rules:
  - id: no-direct-sql-import
    patterns:
      - pattern: import sqlite3
    message: >
      Direct sqlite3 import is prohibited. All database access must go through
      the DB Gateway service. Use Gateway*Store implementations instead.
    languages: [python]
    severity: ERROR
    paths:
      include:
        - src/
      exclude:
        - tests/
        - src/db_gateway_service/
        - src/ui_service/

  - id: no-direct-sql-from-import
    patterns:
      - pattern-regex: "^from\\s+sqlite3\\s+import\\s+.+$"
    message: >
      Direct sqlite3 import is prohibited. All database access must go through
      the DB Gateway service. Use Gateway*Store implementations instead.
    languages: [python]
    severity: ERROR
    paths:
      include:
        - src/
      exclude:
        - tests/
        - src/db_gateway_service/
        - src/ui_service/

  - id: no-aiosqlite-import
    patterns:
      - pattern: import aiosqlite
    message: >
      Direct aiosqlite import is prohibited. All database access must go through
      the DB Gateway service.
    languages: [python]
    severity: ERROR
    paths:
      include:
        - src/
      exclude:
        - tests/
        - src/db_gateway_service/
        - src/ui_service/

  - id: no-aiosqlite-from-import
    patterns:
      - pattern-regex: "^from\\s+aiosqlite\\s+import\\s+.+$"
    message: >
      Direct aiosqlite import is prohibited. All database access must go through
      the DB Gateway service.
    languages: [python]
    severity: ERROR
    paths:
      include:
        - src/
      exclude:
        - tests/
        - src/db_gateway_service/
        - src/ui_service/

  - id: no-direct-sql.no-nosemgrep
    languages: [python]
    severity: ERROR
    message: |
      Do not use '# nosemgrep' to suppress semgrep findings.
      Fix the underlying issue instead.
    pattern-regex: '(?m)#\s*nosemgrep(?::\s*.*)?'
    paths:
      include:
        - src/
      exclude:
        - tests/
