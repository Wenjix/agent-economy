# Court Service Configuration
# Environment variable overrides use prefix: COURT__

service:
  name: "court"
  version: "0.1.0"

server:
  host: "127.0.0.1"
  port: 8005
  log_level: "info"

logging:
  level: "INFO"
  directory: "data/logs"

database:
  path: "data/court.db"

platform:
  agent_config_path: "../../agents/config.yaml"

disputes:
  rebuttal_deadline_seconds: 86400
  max_claim_length: 10000
  max_rebuttal_length: 10000

judges:
  panel_size: 1
  judges:
    - id: "judge-0"
      model: "openai/google/gemma-3-1b"
      api_base: "http://localhost:1234/v1"
      api_key_env: "LMSTUDIO_API_KEY"
      temperature: 0.3

request:
  max_body_size: 1048576

db_gateway:
  url: "http://127.0.0.1:8007"
  timeout_seconds: 10
